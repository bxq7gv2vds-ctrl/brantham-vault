<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>meme anakin — Brantham</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1080px; }
  body { background: #efebe0; }

  .post {
    position: relative;
    width: 1080px;
    height: 1080px;
    background: #efebe0;
  }
  .post.dark { background: #0e1a2b; }

  .mm-grid {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 960px;
    height: 960px;
  }
  .mm-grid img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .mm-cell {
    position: absolute;
    width: 50%;
    height: 50%;
    display: flex;
    padding: 24px 28px;
    align-items: flex-end;
  }
  .mm-cell .txt {
    width: 100%;
    text-align: center;
    color: #fff;
    font-family: "Impact", "Haettenschweiler", "Arial Narrow Bold", sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    line-height: 1.05;
    -webkit-text-stroke: 1.8px #000;
    text-shadow:
      2.5px 2.5px 0 #000,
      -2.5px -2.5px 0 #000,
      2.5px -2.5px 0 #000,
      -2.5px 2.5px 0 #000,
      0 0 8px rgba(0,0,0,0.85);
  }

  .mm-cell.tl { top: 0; left: 0; }
  .mm-cell.tr { top: 0; left: 50%; }
  .mm-cell.bl { top: 50%; left: 0; }
  .mm-cell.br { top: 50%; left: 50%; }

  .mm-cell.tl .txt { font-size: 28px; }
  .mm-cell.tr .txt { font-size: 32px; }
  .mm-cell.bl .txt { font-size: 56px; opacity: 0.9; padding-bottom: 8px; }
  .mm-cell.br .txt { font-size: 32px; }

  .logo {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
  }
  .logo img {
    height: 38px;
    display: block;
  }
  .post.dark .logo img {
    filter: brightness(0) invert(1) drop-shadow(0 1px 2px rgba(0,0,0,0.4));
  }
</style>
</head>
<body>

<div class="post">
  <div class="mm-grid">
    <img src="../anakin.png" alt="">
    <div class="mm-cell tl"><div class="txt">On a un dispositif voté par l'État pour racheter une boîte sans le passif</div></div>
    <div class="mm-cell tr"><div class="txt">Donc la corp dev française l'utilise ?</div></div>
    <div class="mm-cell bl"><div class="txt">…</div></div>
    <div class="mm-cell br"><div class="txt">Donc la corp dev française l'utilise ?</div></div>
  </div>

  <div class="logo"><img src="../logo.png" alt="Brantham Partners"></div>
</div>

</body>
</html>
