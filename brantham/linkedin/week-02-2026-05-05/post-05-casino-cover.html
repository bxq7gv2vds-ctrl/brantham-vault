<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Brantham — Casino · Cover article</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#cfcabb; }
  body { padding:0; display:flex; justify-content:center; }

  /* Ratio 1.91:1 — format cover article LinkedIn (1200x627 affiché). Rendu @2x. */
  .card {
    width:1280px; height:670px; background:#EFEBE0; color:#1A1A1A;
    font-family:'Newsreader', Georgia, 'Times New Roman', serif;
    padding:56px 96px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    gap:28px; position:relative; overflow:hidden;
  }

  .logo-casino img { width:330px; height:auto; display:block; }

  h1 {
    font-weight:400; font-size:48px; line-height:1.14; letter-spacing:-0.01em;
    color:#1A1A1A; max-width:1040px;
  }
  h1 .red { color:#7A1D17; }

  .sub {
    font-size:20px; line-height:1.45; color:#5C594E; max-width:720px;
  }
</style>
</head>
<body>
<div class="card">

  <div class="logo-casino"><img src="casino-logo.svg" alt="Casino"></div>
  <h1>33 milliards d'euros ont changé de mains. <span class="red">Pas une action échangée en Bourse.</span></h1>
  <div class="sub">Comment le contrôle du groupe Casino a basculé entre octobre 2023 et mars 2024, et ce que ça nous dit sur le rachat d'entreprises en difficulté.</div>

</div>
</body>
</html>
