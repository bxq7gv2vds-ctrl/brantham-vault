<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Brantham — Casino · Le partage du capital</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .rs {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 96px;
  }

  .rs .title {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 34px;
    line-height: 1.16;
    letter-spacing: -0.02em;
    color: #F8F7F4;
    margin-bottom: 64px;
    max-width: 780px;
  }
  .rs .title .it { font-style: italic; }

  .rs .row {
    display: grid;
    grid-template-columns: 1fr 150px;
    column-gap: 40px;
    align-items: baseline;
    padding: 24px 0;
    border-top: 1px solid rgba(248,247,244,0.14);
  }
  .rs .row:last-of-type { border-bottom: 1px solid rgba(248,247,244,0.14); }

  .rs .who {
    font-family: var(--serif);
    font-size: 22px;
    line-height: 1.35;
    color: #F8F7F4;
  }
  .rs .who .sub {
    display: block;
    font-size: 14px;
    font-style: italic;
    color: rgba(248,247,244,0.55);
    margin-top: 6px;
  }
  .rs .pct {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 56px;
    line-height: 1;
    letter-spacing: -0.02em;
    text-align: right;
    color: #F8F7F4;
    font-variant-numeric: tabular-nums lining-nums;
  }
  .rs .pct .u { font-size: 0.42em; font-weight: 400; margin-left: 0.08em; }
  .rs .row.new .who, .rs .row.new .pct { color: #C8B97A; }
  .rs .row.wiped .who, .rs .row.wiped .pct { color: rgba(248,247,244,0.45); }

  .rs .coda {
    margin-top: 44px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 21px;
    line-height: 1.4;
    color: rgba(248,247,244,0.78);
    max-width: 720px;
  }
  .rs .coda b { font-style: normal; font-weight: 600; color: #F8F7F4; }
</style>
</head>
<body>

<div class="post rs dark">

  <div class="title">
    Le capital de Casino, <span class="it">après</span> le plan.
  </div>

  <div class="row new">
    <div class="who">Consortium Kretinsky<span class="sub">1,2 Md€ d'argent frais injecté</span></div>
    <div class="pct">53<span class="u">%</span></div>
  </div>
  <div class="row">
    <div class="who">Anciens créanciers<span class="sub">4,9 Mds€ de dette convertis en actions</span></div>
    <div class="pct">46<span class="u">%</span></div>
  </div>
  <div class="row wiped">
    <div class="who">Anciens actionnaires<span class="sub">dont la galaxie Naouri · Rallye</span></div>
    <div class="pct">1<span class="u">%</span></div>
  </div>

  <div class="coda">
    Les actionnaires historiques dilués à <b>99 %</b>. Le PDG de 30 ans, sorti. Aucune offre publique.
  </div>

</div>

</body>
</html>
