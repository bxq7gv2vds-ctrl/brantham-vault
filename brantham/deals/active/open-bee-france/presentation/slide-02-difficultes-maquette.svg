<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#FFFFFF"/>
  <rect x="54" y="40" width="1492" height="8" fill="#0B1D3A"/>
  <line x1="54" y1="91" x2="96" y2="91" stroke="#0B1D3A" stroke-width="2"/>
  <text x="112" y="103" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#121820">OPEN BEE |</text>
  <text x="318" y="103" font-family="Arial, sans-serif" font-size="27" fill="#0B1D3A">Un modèle fragilisé, mais des actifs stratégiques à préserver en reprise</text>

  <!-- Cause 1: profitability -->
  <rect x="55" y="142" width="790" height="698" fill="#FFFFFF" stroke="#C9CDD2" stroke-width="1.5"/>
  <line x1="76" y1="176" x2="102" y2="176" stroke="#0B1D3A" stroke-width="2"/>
  <text x="120" y="182" font-family="Arial" font-size="20" font-weight="700" fill="#0B1D3A">Cause #1 :</text>
  <text x="245" y="182" font-family="Arial" font-size="20" font-weight="700" fill="#131A22">le CA publié ne se transforme plus en résultat</text>
  <text x="94" y="227" font-family="Arial" font-size="13.5" font-weight="700" fill="#131A22">Chiffre d'affaires publié (M€)</text>
  <text x="620" y="227" font-family="Arial" font-size="13.5" font-weight="700" fill="#C8251A">Marge d'exploitation (%)</text>

  <!-- Chart -->
  <line x1="135" y1="507" x2="769" y2="507" stroke="#C6CCD3" stroke-width="1.5"/>
  <text x="108" y="511" font-family="Arial" font-size="12" fill="#59616B">0</text>
