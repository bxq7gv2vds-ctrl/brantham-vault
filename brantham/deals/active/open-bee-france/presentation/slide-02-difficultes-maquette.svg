  <text x="104" y="415" font-family="Arial" font-size="12" fill="#59616B">4</text>
  <text x="104" y="367" font-family="Arial" font-size="12" fill="#59616B">6</text>
  <text x="104" y="319" font-family="Arial" font-size="12" fill="#59616B">8</text>
  <text x="96" y="271" font-family="Arial" font-size="12" fill="#59616B">10</text>
  <line x1="135" y1="459" x2="769" y2="459" stroke="#EBEDF0"/>
